totem {
    version: 2
    secauth: off
    cluster_name: webz_cluster
    transport: udpu
}

nodelist {
    node {
        ring0_addr: webz-001
        nodeid: 1
    }
    node {
        ring0_addr: webz-002
        nodeid: 2
    }
    node {
        ring0_addr: webz-003
        nodeid: 3
    }
}

quorum {
    provider: corosync_votequorum
    two_node: 0
}

logging {
    to_syslog: yes
}
